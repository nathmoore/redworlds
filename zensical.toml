[project]
site_name = "Red Worlds"
site_url = "https://nathmoore.github.io/redworlds/"
repo_url = "https://github.com/nathmoore/redworlds"
repo_name = "nathmoore/redworlds"

nav = [
  { "Home" = "index.md" },
  { "Installation" = "installation.md" },
  { "Usage" = "usage.md" },
  { "Design" = [
    { "Architecture" = "design/architecture.md" },
    { "Assumptions" = "design/assumptions.md" },
    { "Game Mechanics" = "design/game_mechanics.md" },
    { "References" = "design/references.md" },
  ]},
  { "API Reference" = "api.md" },
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to light mode"

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]
